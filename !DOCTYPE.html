<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Celebration</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
    background: #fff8e7;
    color: #333;
}

/* Hero background image */
#heroBg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -3;
    animation: slowZoom 30s linear infinite;
    opacity: 0.25; /* subtle devotional effect */
}

@keyframes slowZoom {
    0% { transform: scale(1) translate(0,0); }
    50% { transform: scale(1.05) translate(-10px,-10px); }
    100% { transform: scale(1) translate(0,0); }
}

/* Overlay for readability */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255, 248, 231, 0.7);
    z-index: -2;
}

/* Hero content */
.content {
    position: relative;
    text-align: center;
    top: 25%;
    transform: translateY(-10%);
    padding: 0 20px;
}

h1.hero {
    font-size: 70px;
    color: #d35400;
    text-shadow: 0 0 10px #e67e22, 0 0 20px #f39c12, 0 0 30px #e74c3c;
    animation: glowZoom 2s infinite alternate;
    margin-bottom: 20px;
}

@keyframes glowZoom {
    0% { transform: scale(1); text-shadow: 0 0 10px #e67e22; }
    50% { transform: scale(1.05); text-shadow: 0 0 25px #f39c12; }
    100% { transform: scale(1.1); text-shadow: 0 0 40px #e74c3c; }
}

/* Floating petals/hearts */
.floating {
    position: fixed;
    font-size: 20px;
    animation: float linear;
    z-index: 2;
}

@keyframes float {
    to { transform: translateY(-100vh); opacity: 0; }
}

/* Info section */
.info {
    margin-top: 30px;
    font-size: 22px;
}

/* Countdown */
.countdown {
    margin-top: 20px;
    font-size: 24px;
    font-weight: bold;
}

/* Gallery */
.gallery {
    margin-top: 40px;
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding-bottom: 20px;
}

.gallery img {
    height: 250px;
    margin: 0 10px;
    border-radius: 15px;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px gold;
}
</style>
</head>

<body>

<!-- Hero Background -->
<img id="heroBg" src="dagdusheth_bappa.jpg" alt="Dagdusheth Ganpati">

<div class="overlay"></div>

<div class="content">

<h1 class="hero">गणपती बाप्पा मोरया! 🙏</h1>

<h1 id="names">Subham ❤️ Neha</h1>

<div class="info">
<p id="venue">स्थळ: पुणे, महाराष्ट्र</p>
<p id="subhamuhur">शुभमूहूर्त: सकाळी 07:15</p>
</div>

<div class="countdown" id="countdown">Countdown: 0 Days 0 Hours</div>

<!-- Photo Gallery -->
<div class="gallery">
<img src="photo1.jpg" alt="Photo1">
<img src="photo2.jpg" alt="Photo2">
<img src="photo3.jpg" alt="Photo3">
<img src="photo4.jpg" alt="Photo4">
<img src="photo5.jpg" alt="Photo5">
</div>

</div>

<!-- Background Music -->
<audio autoplay loop>
<source src="music.mp3">
</audio>

<script>
// Countdown logic
let weddingDate = new Date("2026-05-01T17:15:00").getTime();
setInterval(()=>{
 let now = new Date().getTime();
 let gap = weddingDate - now;

 let days = Math.floor(gap/(1000*60*60*24));
 let hours = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
 let minutes = Math.floor((gap%(1000*60*60))/(1000*60));
 let seconds = Math.floor((gap%(1000*60))/1000);

 document.getElementById("countdown").innerHTML =
 "Countdown: "+days+" Days "+hours+" H "+minutes+" M "+seconds+" S";
},1000);

// Floating petals/hearts
setInterval(()=>{
 const emojis = ["🌸","❤️"];
 let e = document.createElement("div");
 e.className = "floating";
 e.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
 e.style.left = Math.random()*100 + "vw";
 e.style.animationDuration = (4+Math.random()*5) + "s";
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),8000);
},300);
</script>

</body>
</html>
